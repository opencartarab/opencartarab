    <script>
        (function() {
            var currentUrl = window.location.href.toLowerCase();
            var targetUrl = "https://opencartarab.com/";

            var rules = [
                { key: "product_id=209", dest: "/features.html" },
                { key: "product_id=205", dest: "/features.html" },
                { key: "information_id=22", dest: "/about.html" },
                { key: "payment-policy.html", dest: "/basic-hosting.html" },
                { key: "viewtopic.php", dest: "/" },
                { key: "/forum/", dest: "/" },
                { key: "/a/", dest: "/" },
                { key: "/demo/", dest: "/" },
                { key: "/account/", dest: "/" },
                { key: "index.php", dest: "/" },
                { key: "/home", dest: "/" },
                { key: ".zip", dest: "/releases.html" },
                
                { key: "%d9%85%d9%84%d9%81%d8%a7%d8%aa", dest: "/releases.html" }, 
                { key: "%d8%a5%d8%b5%d8%af%d8%a7%d8%b1%d8%a7%d8%aa", dest: "/releases.html" }
            ];

            
            for (var i = 0; i < rules.length; i++) {
                if (currentUrl.indexOf(rules[i].key.toLowerCase()) !== -1) {
                    targetUrl = rules[i].dest;
                    break;
                }
            }

            
            var fullTargetUrl = (targetUrl.startsWith('http')) ? targetUrl : "https://opencartarab.com" + (targetUrl.startsWith('/') ? targetUrl : "/" + targetUrl);
            var canonicalLink = document.createElement('link');
            canonicalLink.rel = 'canonical';
            canonicalLink.href = fullTargetUrl;
            document.head.appendChild(canonicalLink);

            
            setTimeout(function() {
                window.location.replace(fullTargetUrl);
            }, 300);
        })();
    </script>

<!-- سكربت تحليلات جوجل  -->
    <script>
    document.addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (!link) return;

        const href = link.getAttribute('href');
        if (!href) return;

        if (href.endsWith('.zip') || href.endsWith('.pdf')) {
            const cleanUrl = href.split('?')[0];

            gtag('event', 'file_download', {
                file_extension: cleanUrl.split('.').pop(),
                file_name: cleanUrl.split('/').pop(),
                link_url: href
            });
        }
    });
    </script>
    <!-- سكربت تحليلات جوجل  -->
    <script>
    if (!sessionStorage.getItem('404_tracked')) {
        gtag('event', 'page_not_found', {
            page_path: window.location.href,
            referrer: document.referrer
        });

        sessionStorage.setItem('404_tracked', 'true');
    }
    </script>

</body>
